version: 1

server:
  host: "127.0.0.1"
  port: 8020

storage:
  backend: "postgres"
  database_url: "postgresql://llm_database@127.0.0.1:8032/llm_database"
  database_password_env: "LOCAL_LLM_POSTGRES_PASSWORD"
  artifact_dir: "~/.local/share/local-llm/artifacts"

eval_capture:
  enabled: true
  default_capture_mode: "full"
  default_privacy_level: "none"
  failure_policy: "fail_closed"
  source_system: "local_llm"
  runtime_root: null
  runtime_capture_enabled: true
  models_payload_capture_enabled: true
  redaction_policy_version: 1

privacy:
  allow_ui_toggle: true
  allow_cli_toggle: true
  strict_retrieval_identity_redaction: true
  retrieval_identity_hmac_secret_env: null

training:
  experiment_default_replicates: 2
  experiment_max_replicates_per_condition: 20
  experiment_max_planned_packets: 100
  operator_score_min: 1
  operator_score_max: 5
  operator_label_options:
    - accept
    - revise
    - reject
    - unclear

model_profiles:
  local_basic:
    provider: "openai_compatible"
    base_url: "http://127.0.0.1:8021/v1"
    api_key: "not-needed"
    model: "local-small"
    context_window: 8192
    eval_capture_mode: "full"
    privacy_level: "none"
    privacy_required: false
    runtime_root: null
    defaults:
      temperature: 0.2
      max_tokens: 900

corpora:
  primary_local_corpus:
    roots:
      - "/home/wantless/PycharmProjects/automation/local_llm"
    include_globs:
      - "**/*.md"
      - "**/*.py"
      - "**/*.js"
      - "**/*.html"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/*.toml"
      - "**/*.txt"
      - "**/*.json"
    exclude_globs:
      - "**/.venv/**"
      - "**/__pycache__/**"
      - "**/.git/**"
      - "**/*.sqlite"
      - "**/*.sqlite-shm"
      - "**/*.sqlite-wal"
      - "**/*.zip"
      - "**/.mypy_cache/**"
      - "**/.pytest_cache/**"
      - "**/*.egg-info/**"
      - "tests/**"
      - "**/tests/**"

rag_profiles:
  project_basic:
    enabled: true
    corpus: "primary_local_corpus"
    retrieval:
      method: "postgres_fts"
      top_k: 8
    chunking:
      target_chars: 1800
      overlap_chars: 250
    context:
      max_context_chars: 14000
      include_source_headers: true

prompt_profiles:
  source_grounded_answer:
    grounding_mode: "require_sources"
    system: |
      You are a local source-grounded assistant.
      Use retrieved context when relevant.
      Distinguish source-supported facts from inference.
      Preserve uncertainty.
      If the retrieved context does not support an answer, say so.
    user_template: |
      User request:
      {user_input}

      Retrieved context:
      {retrieved_context}

      Answer:

workflows:
  default_rag_answer:
    kind: "rag_answer"
    model_profile: "local_basic"
    rag_profile: "project_basic"
    prompt_profile: "source_grounded_answer"
    eval_capture_mode: "full"
    privacy_level: "none"