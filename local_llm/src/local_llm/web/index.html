                    <div class="chat-turn user">
                        <div class="turn-head"><strong>User</strong><span class="mono">${escapeHtml(state.lastPrompt ? new Date().toLocaleString() : "latest prompt")}</span></div>
                        <div class="turn-body">${escapeHtml(state.lastPrompt || "No prompt captured.")}</div>
                    </div>
                    <div class="chat-turn assistant">
                        <div class="turn-head"><strong>Assistant</strong>${packetId ? badge(shortId(packetId), "accent") : badge("no packet")}</div>
                        <div class="turn-body">${escapeHtml(responseText || "No response text.")}</div>
                    </div>
                </div>` : ""}
                ${packetSummary ? `<div class="stat-grid">
                    ${metricStat("latency ms", response.latency_ms ?? packetSummary.latency_ms)}
                    ${metricStat("capture", packetSummary.capture_mode)}
                    ${metricStat("privacy", packetSummary.privacy_level)}
                    ${metricStat("warnings", asArray(response.warnings || packetSummary.warnings).length)}
                </div>` : ""}
                <div class="turn-actions">
                    <button class="secondary" data-action="inspect-active-packet" ${!packetId ? "disabled" : ""}>Open evidence packet</button>
                    <button class="secondary" data-action="feedback-active-packet" ${!packetId ? "disabled" : ""}>Add feedback</button>
                    <button class="secondary" data-action="compare-active-packet" ${!packetId ? "disabled" : ""}>Compare this packet</button>
                    <button class="ghost" data-action="start-experiment" ${!state.lastPrompt ? "disabled" : ""}>Start experiment from this prompt</button>
                </div>
                ${asArray(state.chatHistory).length ? `<details><summary>Previous turns in this browser session (${state.chatHistory.length})</summary><div class="details-body list">${state.chatHistory.map(item => `
                    <div class="list-item clickable" data-action="load-packet" data-packet-id="${escapeAttr(item.packetId || "")}">
                        <div class="item-title">${escapeHtml(new Date(item.at).toLocaleString())}</div>
                        <div class="item-meta mono">packet=${escapeHtml(item.packetId ? shortId(item.packetId) : "none")}</div>
                        <div class="item-meta">${escapeHtml(item.prompt)}</div>
                    </div>`).join("")}</div></details>` : ""}
            </div>`;
        }

        function renderComposerCard() {
            const endpointLabel = state.activeSessionId ? "POST /sessions/{session_id}/turns" : "POST /respond";
            const canRun = Boolean(state.activeWorkflowId && state.prompt.trim());
            return `
            <div class="card" id="composer-card">
                <div class="card-header">
                    <div>
                        <div class="card-title">3. Prompt and response</div>
                        <div class="card-subtitle">Run the prompt here, review the full answer in place, then open the packet only when you want evidence detail.</div>
                    </div>
                    ${badge(endpointLabel, "accent")}
                </div>
                <div class="card-body stack">
                    <label class="field">Prompt <textarea data-field="prompt" placeholder="Ask a source-grounded prompt…">${escapeHtml(state.prompt)}</textarea></label>
                    <div class="row">
                        <button class="secondary" data-action="preview-retrieval" ${state.busy.search ? "disabled" : ""}>${state.busy.search ? "Previewing…" : "Preview retrieval"}</button>
                        <button class="primary" data-action="run-turn" ${state.busy.turn || !canRun ? "disabled" : ""}>${state.busy.turn ? "Running…" : "Run turn"}</button>
                        <button class="ghost" data-action="run-private" ${state.busy.turn || !state.activeWorkflowId || !state.prompt.trim() ? "disabled" : ""}>Run private strict</button>
                        <button class="ghost" data-action="clear-prompt">Clear</button>
                    </div>
                    ${renderInlineTurnResult()}
                </div>
            </div>`;
        }

        function renderRetrievalResults(results) {
            if (!asArray(results).length) return `<div class="empty">No retrieval preview loaded.</div>`;
            return `<div class="list">${asArray(results).map(result => `
                <div class="list-item">
                    <div class="row-between"><div class="item-title">#${result.rank} ${escapeHtml(result.source_title || result.document_path)}</div>${badge(result.method || "search", "info")}</div>
                    <div class="item-meta mono">score=${escapeHtml(result.score)} chunk=${escapeHtml(shortId(result.chunk_id || ""))}</div>
                    ${textBlock(result.text, "No chunk text returned.")}
                </div>`).join("")}</div>`;
        }

        function renderPreviewCard() {
            const observation = state.search && state.search.observation;
            return `
            <div class="card" id="retrieval-preview-card">
                <div class="card-header">
                    <div>
                        <div class="card-title">4. Retrieval preview</div>
                        <div class="card-subtitle">Optional PostgreSQL FTS preflight for the current prompt and RAG profile.</div>
                    </div>
                    ${state.search ? badge(`${asArray(state.search.results).length} chunks`, "info") : badge("not previewed")}
                </div>
                <div class="card-body stack">
                    ${observation ? `<div class="stat-grid">
                        ${metricStat("method", observation.retrieval_method)}
                        ${metricStat("returned", observation.returned_count)}
                        ${metricStat("included", observation.included_count)}
                        ${metricStat("latency ms", observation.latency_ms)}
                    </div>` : ""}
                    ${renderRetrievalResults(state.search && state.search.results)}
                </div>
            </div>`;
        }

        function renderLatestRunCard() {
            const response = state.latestResponse;
            const packetId = responsePacketId(response);
            const packetSummary = response && response.packet_summary;
            return `
            <div class="card" id="latest-packet-card">
                <div class="card-header">
                    <div>
                        <div class="card-title">5. Latest response + packet bridge</div>
                        <div class="card-subtitle">After a turn, continue directly to evidence inspection, feedback, comparison, or experiment setup.</div>
                    </div>
                    ${packetId ? badge(shortId(packetId), "accent") : badge("no run yet")}
                </div>
                <div class="card-body stack">
                    ${response ? textBlock(response.response_text || (packetSummary && packetSummary.response_text), "No response text.") : `<div class="empty">Run a turn to populate the response bridge.</div>`}
                    ${packetSummary ? `<div class="stat-grid">
                        ${metricStat("latency ms", response.latency_ms ?? packetSummary.latency_ms)}
                        ${metricStat("capture", packetSummary.capture_mode)}
                        ${metricStat("privacy", packetSummary.privacy_level)}
                        ${metricStat("warnings", asArray(response.warnings || packetSummary.warnings).length)}
                    </div>` : ""}
                    <div class="row">
                        <button class="secondary" data-action="inspect-active-packet" ${!packetId ? "disabled" : ""}>Inspect packet</button>
                        <button class="secondary" data-action="feedback-active-packet" ${!packetId ? "disabled" : ""}>Add feedback</button>
                        <button class="secondary" data-action="compare-active-packet" ${!packetId ? "disabled" : ""}>Compare this packet</button>
                        <button class="ghost" data-action="start-experiment">Start experiment from prompt</button>
                    </div>
                    ${asArray(state.chatHistory).length ? `<details><summary>Recent turns (${state.chatHistory.length})</summary><div class="details-body list">${state.chatHistory.map(item => `
                        <div class="list-item clickable" data-action="load-packet" data-packet-id="${escapeAttr(item.packetId || "")}">
                            <div class="item-title">${escapeHtml(new Date(item.at).toLocaleString())}</div>
                            <div class="item-meta mono">packet=${escapeHtml(item.packetId ? shortId(item.packetId) : "none")}</div>
                            <div class="item-meta">${escapeHtml(item.prompt)}</div>
                        </div>`).join("")}</div></details>` : ""}
                </div>
            </div>`;
        }

        function renderSessionHistoryCard() {
            const packets = asArray(state.sessionTurns && state.sessionTurns.packets);
            return `
            <div class="card">
                <div class="card-header">
                    <div><div class="card-title">Session packet history</div><div class="card-subtitle">Automatically scoped to the active session.</div></div>
                    ${badge(`${packets.length} packets`, "info")}
                </div>
                <div class="card-body">
                    ${state.activeSessionId ? renderPacketSummaryList(packets, "No packets in this session yet.", true) : `<div class="empty">Select or create a session to view session-scoped packet history.</div>`}
                </div>
            </div>`;
        }

        function renderWorkspace() {
            return `<section class="section-grid">
                ${renderSessionWorkspaceCard()}
                ${renderRunSetupCard()}
                ${renderComposerCard()}
                ${renderPreviewCard()}
                ${renderSessionHistoryCard()}
            </section>`;
        }

        function renderPacketSummaryList(packets, empty, withSelection = false) {
            if (!asArray(packets).length) return `<div class="empty">${escapeHtml(empty)}</div>`;
            return `<div class="list">${asArray(packets).map(packet => {
                const id = packet.turn_packet_id;
                const selected = id === state.activePacketId;
                const checked = state.selectedPacketIds.has(id);
                return `<div class="list-item clickable ${selected ? "selected" : ""}" data-action="load-packet" data-packet-id="${escapeAttr(id)}">
                    <div class="row-between">
                        <div class="item-title mono">${escapeHtml(shortId(id))}</div>
                        <span>${statusBadge(packet.capture_status)} ${badge(packet.capture_mode, packet.capture_mode === "privacy" ? "warn" : "info")}</span>
                    </div>
                    <div class="item-meta">${escapeHtml(packet.workflow_id)} · ${escapeHtml(packet.created_at || "")}</div>
                    <div class="item-meta">${escapeHtml((packet.response_text || "").slice(0, 220))}</div>
                    ${withSelection ? `<label class="row" style="margin-top:8px"><input style="width:auto" type="checkbox" data-action="toggle-packet" data-packet-id="${escapeAttr(id)}" ${checked ? "checked" : ""}> include in manual compare</label>` : ""}
                </div>`;
            }).join("")}</div>`;
        }

        function renderPacketDetailCard() {
            const detail = state.packetDetail;
            if (!detail) return `<div class="card"><div class="card-body empty">No packet selected.</div></div>`;
            const summary = detail.summary || {};
            return `<div class="card" id="packet-evidence-card">
                <div class="card-header"><div><div class="card-title">Packet evidence</div><div class="card-subtitle mono">${escapeHtml(summary.turn_packet_id || "")}</div></div>${statusBadge(summary.capture_status)}</div>
                <div class="card-body stack">
                    <div class="stat-grid">
                        ${metricStat("workflow", summary.workflow_id)}
                        ${metricStat("source", summary.source_kind)}
                        ${metricStat("capture", summary.capture_mode)}
                        ${metricStat("privacy", summary.privacy_level)}
                        ${metricStat("session", summary.session_id ? shortId(summary.session_id) : "—")}
                        ${metricStat("turn", summary.turn_ordinal ?? "—")}
                    </div>
                    ${textBlock(summary.response_text, "No persisted response text available.")}
                    ${renderContentRefs(detail.content_refs)}
                    ${renderArtifacts(detail.artifacts)}
                    ${renderMetricFacts(detail.metric_facts)}
                    ${renderEvents(detail.events)}
                    ${rawDetails("Attempts", detail.attempts)}
                    ${rawDetails("Groups", detail.groups)}
                    ${rawDetails("Full packet JSON", detail)}
                </div>
            </div>`;
        }

        function renderOperatorFeedbackCard() {
            const labels = asArray(state.training.operator_label_options);
            return `<div class="card">
                <div class="card-header"><div><div class="card-title">Operator feedback</div><div class="card-subtitle">Saved as packet-native quality metric facts; no separate feedback table.</div></div></div>
                <div class="card-body stack">
                    <div class="field-grid">
                        <label class="field">Score (${state.training.operator_score_min}–${state.training.operator_score_max})
                            <input type="number" min="${escapeAttr(state.training.operator_score_min)}" max="${escapeAttr(state.training.operator_score_max)}" step="0.1" data-field="operatorFeedback.score" value="${escapeAttr(state.operatorFeedback.score)}">
                        </label>
                        <label class="field">Label ${selectHtml({
                field: "operatorFeedback.label",
                options: labels,
                value: state.operatorFeedback.label,
                placeholder: "No label"
            })}</label>
                    </div>
                    <label class="field">Note <textarea data-field="operatorFeedback.note">${escapeHtml(state.operatorFeedback.note)}</textarea></label>
                    ${state.operatorFeedback.error ? `<div class="error-text">${escapeHtml(state.operatorFeedback.error)}</div>` : ""}
                    <div class="row"><button class="primary" data-action="save-feedback" ${!state.activePacketId || state.busy.operatorFeedback ? "disabled" : ""}>${state.busy.operatorFeedback ? "Saving…" : "Save feedback"}</button>${state.operatorFeedback.result ? badge("feedback saved", "ok") : ""}</div>
                </div>
            </div>`;
        }

        function renderEvents(events) {
            const rows = asArray(events).map(event => `<tr><td>${event.event_order}</td><td>${escapeHtml(event.event_name)}</td><td>${escapeHtml(event.event_status)}</td><td>${escapeHtml(event.latency_ms ?? "")}</td><td>${escapeHtml(event.privacy_safe)}</td></tr>`).join("");
            return `<details><summary>Events (${asArray(events).length})</summary><div class="details-body table-wrap"><table><thead><tr><th>#</th><th>Name</th><th>Status</th><th>ms</th><th>safe</th></tr></thead><tbody>${rows}</tbody></table></div></details>`;
        }

        function renderContentRefs(refs) {
            const rows = asArray(refs).map(ref => `<tr><td>${escapeHtml(ref.content_role)}</td><td>${escapeHtml(ref.owner_type)}</td><td>${escapeHtml(ref.body_persisted)}</td><td>${escapeHtml(ref.payload_policy)}</td><td>${escapeHtml(ref.size_bytes ?? "")}</td><td><button class="ghost" data-action="load-content" data-content-id="${escapeAttr(ref.content_ref_id)}">load</button></td></tr>`).join("");
            return `<details open><summary>Content refs (${asArray(refs).length})</summary><div class="details-body table-wrap"><table><thead><tr><th>Role</th><th>Owner</th><th>body</th><th>policy</th><th>size</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></details>${state.contentLoad ? rawDetails("Loaded content ref", state.contentLoad, true) : ""}`;
        }

        function renderArtifacts(artifacts) {
            const rows = asArray(artifacts).map(artifact => `<tr><td>${escapeHtml(artifact.artifact_type)}</td><td>${escapeHtml(artifact.body_persisted)}</td><td>${escapeHtml(artifact.payload_policy)}</td><td class="mono">${escapeHtml(artifact.path)}</td></tr>`).join("");
            return `<details><summary>Artifacts (${asArray(artifacts).length})</summary><div class="details-body table-wrap"><table><thead><tr><th>Type</th><th>body</th><th>policy</th><th>path</th></tr></thead><tbody>${rows}</tbody></table></div></details>`;
        }

        function renderMetricFacts(facts) {
            const rows = asArray(facts).map(fact => `<tr><td>${escapeHtml(fact.metric_key)}</td><td>${escapeHtml(fact.metric_value_num ?? fact.metric_value_text ?? "")}</td><td>${escapeHtml(fact.unit || "")}</td><td>${escapeHtml(fact.privacy_safe)}</td><td>${escapeHtml(fact.source)}</td></tr>`).join("");
            return `<details open><summary>Metric facts (${asArray(facts).length})</summary><div class="details-body table-wrap"><table><thead><tr><th>Metric</th><th>Value</th><th>Unit</th><th>safe</th><th>source</th></tr></thead><tbody>${rows}</tbody></table></div></details>`;
        }

        function renderEvidence() {
            return `<section class="section-grid">
                <div class="grid-2">
                    <div class="card"><div class="card-header"><div><div class="card-title">Packet list</div><div class="card-subtitle">Select any packet for evidence inspection and feedback.</div></div><button class="ghost" data-action="refresh-packets">Refresh</button></div><div class="card-body">${renderPacketSummaryList(state.packets, "No packets found for current scope.", true)}</div></div>
                    ${renderOperatorFeedbackCard()}
                </div>
                ${renderPacketDetailCard()}
            </section>`;
        }

        function renderCompare() {
            return `<section class="section-grid">
                <div class="card" id="compare-card">
                    <div class="card-header"><div><div class="card-title">Compare using current workspace context</div><div class="card-subtitle">Choose a scope and metric set; backend projection returns aggregate rows and drilldown.</div></div></div>
                    <div class="card-body stack">
                        <div class="field-grid">
                            <label class="field">Metric keys <textarea data-field="metricFilter">${escapeHtml(state.metricFilter)}</textarea></label>
                            <label class="field">Packet group ID <input data-field="activeGroupId" value="${escapeAttr(state.activeGroupId)}"></label>
                        </div>
                        <div class="row">
                            <button class="secondary" data-action="compare-session" ${!state.activeSessionId ? "disabled" : ""}>Compare current session</button>
                            <button class="secondary" data-action="compare-packet" ${!state.activePacketId ? "disabled" : ""}>Compare active packet</button>
                            <button class="secondary" data-action="compare-selected" ${!state.selectedPacketIds.size ? "disabled" : ""}>Compare selected packets (${state.selectedPacketIds.size})</button>
                            <button class="secondary" data-action="compare-group">Compare active group</button>
                            <button class="ghost" data-action="compare-all">Compare visible packets</button>
                        </div>
                    </div>
                </div>
                ${renderProjection()}
            </section>`;
        }

        function renderProjection() {
            const projection = state.projection;
            if (!projection || !projection.table) return `<div class="card"><div class="card-body empty">No projection loaded.</div></div>`;
            const rows = asArray(projection.table.rows);
            const columns = asArray(projection.table.columns).map(c => c.key).filter(Boolean);
            const displayColumns = columns.length ? columns : Object.keys(rows[0] || {});
            return `<div class="card">
                <div class="card-header"><div><div class="card-title">Projection result</div><div class="card-subtitle">Rows are returned by the backend projection path.</div></div>${badge(`${rows.length} rows`, "info")}</div>
                <div class="card-body stack">
                    <div class="table-wrap"><table><thead><tr>${displayColumns.map(c => `<th>${escapeHtml(c)}</th>`).join("")}</tr></thead><tbody>${rows.map(row => `<tr>${displayColumns.map(col => `<td>${escapeHtml(row[col] ?? "")}</td>`).join("")}</tr>`).join("")}</tbody></table></div>
                    ${rawDetails("Privacy summary", projection.privacy)}
                    ${rawDetails("Drilldown", projection.drilldown)}
                </div>
            </div>`;
        }

        function renderExperiments() {
            const maxReplicates = Number(state.training.experiment_max_replicates_per_condition || 20);
            return `<section class="section-grid">
                <div class="card">
                    <div class="card-header"><div><div class="card-title">Experiment builder</div><div class="card-subtitle">Baseline/variable matrix creates packet groups and runs each replicate as its own TurnPacket.</div></div>${badge(`config ${state.training.experiment_default_replicates} reps`, "info")}</div>
                    <div class="card-body stack">
                        <label class="field">Experiment prompt <textarea data-field="experiment.prompt">${escapeHtml(state.experiment.prompt || state.lastPrompt || state.prompt)}</textarea></label>
                        <div class="row"><button class="ghost" data-action="use-workspace-prompt">Use current workspace prompt</button><button class="ghost" data-action="use-latest-prompt">Use latest run prompt</button></div>
                        <div class="field-grid">
                            <label class="field">Baseline label <input data-field="experiment.baselineLabel" value="${escapeAttr(state.experiment.baselineLabel)}"></label>
                            <label class="field">Baseline replicates <input type="number" min="1" max="${escapeAttr(maxReplicates)}" data-field="experiment.baselineReplicates" value="${escapeAttr(state.experiment.baselineReplicates)}"></label>
                        </div>
                        <label class="field">Baseline config overlay <textarea data-field="experiment.baselineOverlay">${escapeHtml(state.experiment.baselineOverlay)}</textarea></label>
                        <div class="divider"></div>
                        <div class="row-between"><strong>Variable conditions</strong><button class="secondary" data-action="add-variable">Add variable</button></div>
                        ${state.experiment.variables.map((item, index) => `<div class="list-item stack">
                            <div class="field-grid">
                                <label class="field">Label <input data-var-index="${index}" data-var-field="label" value="${escapeAttr(item.label)}"></label>
                                <label class="field">Replicates <input type="number" min="1" max="${escapeAttr(maxReplicates)}" data-var-index="${index}" data-var-field="replicateCount" value="${escapeAttr(item.replicateCount)}"></label>
                            </div>
                            <label class="field">Config overlay <textarea data-var-index="${index}" data-var-field="overlay">${escapeHtml(item.overlay)}</textarea></label>
                            <div class="row"><button class="danger" data-action="remove-variable" data-var-index="${index}">Remove</button></div>
                        </div>`).join("")}
                        <div class="row"><button class="primary" data-action="run-experiment" ${state.busy.experiment ? "disabled" : ""}>${state.busy.experiment ? "Running…" : "Run experiment matrix"}</button></div>
                    </div>
                </div>
                ${state.experiment.result ? `<div class="card"><div class="card-header"><div><div class="card-title">Latest experiment result</div><div class="card-subtitle">Experiment group is active for Compare.</div></div>${badge(shortId(state.activeGroupId), "accent")}</div><div class="card-body stack"><div class="stat-grid">${metricStat("planned", state.experiment.result.planned_packet_count)}${metricStat("completed", state.experiment.result.completed_packet_count)}${metricStat("failed", state.experiment.result.failed_packet_count)}</div>${renderProjection()}</div></div>` : ""}
            </section>`;
        }

        function renderDoctorChecks(doctor, limit = null) {
            if (!doctor) return `<div class="empty">Doctor has not run in this UI session.</div>`;
            const checks = limit ? asArray(doctor.checks).slice(0, limit) : asArray(doctor.checks);
            return `<div class="list">${checks.map(check => `<div class="list-item"><div class="row-between"><div class="item-title">${displayHtml(check.name)}</div>${okBadge(check.ok)}</div><div class="item-meta">${displayHtml(check.detail || "")}</div></div>`).join("")}</div>`;
        }

        function renderPrivacyProof() {
            return `<div class="card">
                <div class="card-header"><div><div class="card-title">Privacy proof</div><div class="card-subtitle">Strict-mode sentinel proof for packet-detail exposure.</div></div>${state.privacy.audit ? okBadge(state.privacy.audit.ok, state.privacy.audit.ok ? "pass" : "fail") : badge("not run")}</div>
                <div class="card-body stack">
                    <label class="field">Sentinel <input data-field="privacy.sentinel" value="${escapeAttr(state.privacy.sentinel)}"></label>
                    <label class="field">Prompt template <textarea data-field="privacy.prompt">${escapeHtml(state.privacy.prompt)}</textarea></label>
                    <div class="row"><button class="secondary" data-action="run-privacy-proof" ${state.busy.privacy ? "disabled" : ""}>${state.busy.privacy ? "Running…" : "Run privacy proof"}</button></div>
                    ${state.privacy.audit ? rawDetails("Privacy audit", state.privacy.audit, true) : ""}
                </div>
            </div>`;
        }

        function renderAdmin() {
            const summary = state.summary || {};
            return `<section class="section-grid">
                <div class="grid-2">
                    <div class="card"><div class="card-header"><div><div class="card-title">Readiness</div><div class="card-subtitle">Health, doctor, database, and source counts.</div></div></div><div class="card-body stack"><div class="stat-grid">${metricStat("HTTP", state.health ? state.health.status : "—")}${metricStat("Doctor", state.doctor ? (state.doctor.ok ? "OK" : "FAIL") : "—")}${metricStat("Sources", summary.sources ?? 0)}${metricStat("Packets", summary.turn_packets ?? 0)}</div><div class="row"><button class="secondary" data-action="run-doctor">Run doctor</button><button class="ghost" data-action="refresh">Refresh</button></div>${renderDoctorChecks(state.doctor, 8)}</div></div>
                    <div class="card"><div class="card-header"><div><div class="card-title">Corpus ingest</div><div class="card-subtitle">Index or update the source corpus before running prompts.</div></div></div><div class="card-body stack"><label class="field">Corpus ${selectHtml({
                field: "activeCorpusId",
                options: (state.config && state.config.corpora) || [],
                value: state.activeCorpusId,
                placeholder: "Select corpus"
            })}</label><div class="row"><button class="primary" data-action="run-ingest" ${state.busy.ingest ? "disabled" : ""}>${state.busy.ingest ? "Indexing…" : "Run ingest"}</button></div></div></div>
                </div>
                ${renderPrivacyProof()}
                <div class="card"><div class="card-header"><div><div class="card-title">Config and metrics</div><div class="card-subtitle">Setup data remains visible without competing with the main workflow.</div></div></div><div class="card-body stack">${rawDetails("Config summary", state.config)}${rawDetails("Admin summary", state.summary)}${rawDetails("Metric registry", state.metrics)}</div></div>
                <div class="card"><div class="card-header"><div><div class="card-title">Raw JSON scratchpad</div><div class="card-subtitle">Last selected backend payload.</div></div>${state.rawTitle ? badge(state.rawTitle, "info") : badge("empty")}</div><div class="card-body">${state.rawPayload ? rawDetails(state.rawTitle || "Raw payload", state.rawPayload, true) : `<div class="empty">No raw payload selected.</div>`}</div></div>
            </section>`;
        }

        function renderMain() {
            if (state.activeTab === "workspace") return renderWorkspace();
            if (state.activeTab === "evidence") return renderEvidence();
            if (state.activeTab === "compare") return renderCompare();
            if (state.activeTab === "experiments") return renderExperiments();
            if (state.activeTab === "admin") return renderAdmin();
            return renderWorkspace();
        }

        function renderInspector() {
            const session = activeSession();
            return `<aside class="inspector">
                <div class="nav-section-title">Workflow state</div>
                <div class="stat-grid">
                    ${metricStat("session", session ? session.title : "direct")}
                    ${metricStat("packet", state.activePacketId ? shortId(state.activePacketId) : "none")}
                    ${metricStat("selected", state.selectedPacketIds.size)}
                    ${metricStat("group", state.activeGroupId ? shortId(state.activeGroupId) : "none")}
                </div>
                <div class="nav-section-title">Fast actions</div>
                <div class="stack">
                    <button class="ghost" data-action="inspect-active-packet" ${!state.activePacketId ? "disabled" : ""}>Open Evidence</button>
                    <button class="ghost" data-action="compare-session" ${!state.activeSessionId ? "disabled" : ""}>Compare Session</button>
                    <button class="ghost" data-action="start-experiment">Experiment From Prompt</button>
                </div>
                <div class="nav-section-title">Event log</div>
                <div class="list">${state.log.length ? state.log.map(item => `<div class="list-item"><div class="row-between"><span class="mono">${escapeHtml(item.at)}</span>${badge(item.level, item.level === "bad" ? "bad" : item.level === "ok" ? "ok" : item.level === "warn" ? "warn" : "info")}</div><div class="item-meta">${escapeHtml(item.message)}</div></div>`).join("") : `<div class="empty">No UI events yet.</div>`}</div>
            </aside>`;
        }

        function render() {
            app.innerHTML = `<div class="app-shell">${renderTopbar()}<div class="layout">${renderNav()}<main>${renderMain()}</main>${renderInspector()}</div></div>`;
            if (state.pendingScrollId) {
                const targetId = state.pendingScrollId;
                state.pendingScrollId = "";
                requestAnimationFrame(() => {
                    const node = document.getElementById(targetId);
                    if (node) node.scrollIntoView({behavior: "smooth", block: "start"});
                });
            }
        }

        function currentTurnCapturePolicyValue() {
            const session = activeSession();
            const locked = Boolean(session && session.privacy_locked);
            if (locked && state.captureMode === "full") {
                return session.default_privacy_level === "standard" ? "privacy_standard" : "privacy_strict";
            }
            return turnCapturePolicyFromState();
        }

        function updateNextRunSummaryDom() {
            const root = document.getElementById("turn-settings-card");
            if (!root) return;
            const values = {
                workflow: state.activeWorkflowId || "not selected",
                rag: state.activeRagProfileId || "not selected",
                capture: capturePolicyLabel(currentTurnCapturePolicyValue()),
                corpus: state.activeCorpusId || "not selected",
                topK: String(state.topK || "default")
            };
            for (const [key, value] of Object.entries(values)) {
                const node = root.querySelector(`[data-next-run-summary-value="${key}"]`);
                if (!node) continue;
                node.textContent = cleanUiText(value);
                node.setAttribute("title", value);
            }
        }

        function turnSettingsFieldNeedsLiveSummary(field) {
            return [
                "activeWorkflowId",
                "activeRagProfileId",
                "activeCorpusId",
                "turnCapturePolicy",
                "captureMode",
                "privacyLevel",
                "topK"
            ].includes(field);
        }

        function setField(field, value, element = null, options = {}) {
            const renderAfter = options.renderAfter !== false;
            if (field === "activeSessionId") {
                state.activeSessionId = value;
                if (renderAfter) render();
                return;
            }
            if (field === "activeWorkflowId") state.activeWorkflowId = value;
            else if (field === "activeRagProfileId") state.activeRagProfileId = value;
            else if (field === "activeCorpusId") state.activeCorpusId = value;
            else if (field === "captureMode") state.captureMode = value;
            else if (field === "privacyLevel") state.privacyLevel = value;
            else if (field === "turnCapturePolicy") applyTurnCapturePolicy(value);
            else if (field === "topK") state.topK = Number(value) || 1;
            else if (field === "prompt") state.prompt = value;
            else if (field === "metricFilter") state.metricFilter = value;
            else if (field === "activeGroupId") state.activeGroupId = value;
            else if (field === "sessionDraft.title") {
                markSessionDraftTouched(field);
                state.sessionDraft.title = value;
            } else if (field === "sessionDraft.description") {
                markSessionDraftTouched(field);
                state.sessionDraft.description = value;
            } else if (field === "sessionDraft.default_workflow_id") {
                markSessionDraftTouched(field);
                state.sessionDraft.default_workflow_id = value;
                syncTurnDefaultsFromSessionDraft();
            } else if (field === "sessionDraft.capture_policy") {
                markSessionDraftTouched(field);
                applySessionCapturePolicy(value);
                syncTurnDefaultsFromSessionDraft();
            } else if (field === "sessionDraft.default_capture_mode") {
                markSessionDraftTouched(field);
                state.sessionDraft.default_capture_mode = value;
                syncTurnDefaultsFromSessionDraft();
            } else if (field === "sessionDraft.default_privacy_level") {
                markSessionDraftTouched(field);
                state.sessionDraft.default_privacy_level = value;
                syncTurnDefaultsFromSessionDraft();
            } else if (field === "sessionDraft.privacy_locked") {
                markSessionDraftTouched(field);
                state.sessionDraft.privacy_locked = Boolean(element && element.checked);
                syncTurnDefaultsFromSessionDraft();
            } else if (field === "operatorFeedback.score") state.operatorFeedback.score = value;
            else if (field === "operatorFeedback.label") state.operatorFeedback.label = value;
            else if (field === "operatorFeedback.note") state.operatorFeedback.note = value;
            else if (field === "experiment.prompt") state.experiment.prompt = value;
            else if (field === "experiment.baselineLabel") state.experiment.baselineLabel = value;
            else if (field === "experiment.baselineReplicates") {
                state.experiment.userEdited = true;
                state.experiment.baselineReplicates = boundedReplicateCount(value);
            } else if (field === "experiment.baselineOverlay") {
                state.experiment.userEdited = true;
                state.experiment.baselineOverlay = value;
            } else if (field === "privacy.sentinel") state.privacy.sentinel = value;
            else if (field === "privacy.prompt") state.privacy.prompt = value;
            syncPrivacyPair();
            updateFieldVisual(element, field);
            if (turnSettingsFieldNeedsLiveSummary(field)) updateNextRunSummaryDom();
            if (renderAfter) render();
        }

        function shouldRenderOnInput(target) {
            if (!(target instanceof HTMLElement)) return false;
            if (target.tagName === "TEXTAREA") return false;
            if (target.tagName === "INPUT") {
                const type = String(target.getAttribute("type") || "text").toLowerCase();
                return type === "checkbox" || type === "radio";
            }
            return target.tagName === "SELECT";
        }

        app.addEventListener("input", event => {
            const target = event.target;
            if (!(target instanceof HTMLElement)) return;
            const varIndex = target.getAttribute("data-var-index");
            const varField = target.getAttribute("data-var-field");
            if (varIndex !== null && varField) {
                const item = state.experiment.variables[Number(varIndex)];
                if (item) {
                    state.experiment.userEdited = true;
                    item[varField] = varField === "replicateCount" ? boundedReplicateCount(target.value) : target.value;
                }
                if (shouldRenderOnInput(target)) render();
                return;
            }
            const field = target.getAttribute("data-field");
            if (field) {
                if (field === "activeSessionId") return;
                setField(field, target.type === "checkbox" ? target.checked : target.value, target, {renderAfter: shouldRenderOnInput(target)});
            }
        });

        app.addEventListener("change", async event => {
            const target = event.target;
            if (!(target instanceof HTMLElement)) return;
            const varIndex = target.getAttribute("data-var-index");
            const varField = target.getAttribute("data-var-field");
            if (varIndex !== null && varField) {
                const item = state.experiment.variables[Number(varIndex)];
                if (item) {
                    state.experiment.userEdited = true;
                    item[varField] = varField === "replicateCount" ? boundedReplicateCount(target.value) : target.value;
                }
                if (shouldRenderOnInput(target)) render();
                return;
            }
            const field = target.getAttribute("data-field");
            if (field === "activeSessionId") await selectSession(target.value);
            else if (field) {
                setField(field, target.type === "checkbox" ? target.checked : target.value, target, {renderAfter: shouldRenderOnInput(target)});
            }
            const action = target.getAttribute("data-action");
            if (action === "toggle-packet") {
                const packetId = target.getAttribute("data-packet-id");
                if (packetId) {
                    if (target.checked) state.selectedPacketIds.add(packetId);
                    else state.selectedPacketIds.delete(packetId);
                    render();
                }
            }
        });

        app.addEventListener("focusout", event => {
            const target = event.target;
            if (!(target instanceof HTMLElement)) return;
            const field = target.getAttribute("data-field");
            if (field && field.startsWith("sessionDraft.")) render();
        });

        app.addEventListener("click", async event => {
            const button = event.target.closest("button, .clickable");
            if (!button) return;
            const action = button.getAttribute("data-action");
            if (!action) return;
            if (button.tagName === "BUTTON") event.preventDefault();

            try {
                if (action === "tab") state.activeTab = button.getAttribute("data-tab") || "workspace";
                else if (action === "toggle-nav-section") {
                    const section = button.getAttribute("data-section");
                    if (section === "flow") state.sidebar.flowOpen = !state.sidebar.flowOpen;
                    if (section === "context") state.sidebar.contextOpen = !state.sidebar.contextOpen;
                } else if (action === "route-context") routeToContext(button.getAttribute("data-context"));
                else if (action === "toggle-workspace-card") {
                    const card = button.getAttribute("data-card");
                    if (card === "session") state.workspaceSections.sessionOpen = state.workspaceSections.sessionOpen === false;
                } else if (action === "set-session-mode") setSessionMode(button.getAttribute("data-mode") || "new");
                else if (action === "continue-turn-settings") {
                    state.activeTab = "workspace";
                    state.pendingScrollId = "turn-settings-card";
                } else if (action === "continue-composer") {
                    state.activeTab = "workspace";
                    state.pendingScrollId = "composer-card";
                } else if (action === "discard-session-edits") discardSessionDraftEdits();
                else if (action === "none") return;
                else if (action === "refresh") await refreshCore();
                else if (action === "run-doctor") await runDoctor();
                else if (action === "run-ingest") await runIngest();
                else if (action === "preview-retrieval") await runSearch();
                else if (action === "create-session") await createSession();
                else if (action === "save-session") await saveSession();
                else if (action === "archive-session") await archiveSession();
                else if (action === "new-session-draft") {
                    setSessionMode("new");
                } else if (action === "run-turn") await runTurn();
                else if (action === "run-private") await runTurn({forcePrivacy: true});
                else if (action === "clear-prompt") state.prompt = "";
                else if (action === "load-packet") await loadPacket(button.getAttribute("data-packet-id"));
                else if (action === "load-content") await loadContentRef(button.getAttribute("data-content-id"));
                else if (action === "save-feedback") await saveOperatorFeedback();
                else if (action === "inspect-active-packet") state.activeTab = "evidence";
                else if (action === "feedback-active-packet") state.activeTab = "evidence";
                else if (action === "compare-active-packet") {
                    state.activeTab = "compare";
                    await runProjection("packet");
                } else if (action === "compare-session") {
                    state.activeTab = "compare";
                    await runProjection("session");
                } else if (action === "compare-packet") await runProjection("packet");
                else if (action === "compare-selected") await runProjection("selected");
                else if (action === "compare-group") await runProjection("group");
                else if (action === "compare-all") await runProjection("all");
                else if (action === "load-group") await loadGroup();
                else if (action === "start-experiment") startExperimentFromCurrentPrompt();
                else if (action === "use-workspace-prompt") state.experiment.prompt = state.prompt;
                else if (action === "use-latest-prompt") state.experiment.prompt = state.lastPrompt;
                else if (action === "add-variable") addVariable();
                else if (action === "remove-variable") removeVariable(Number(button.getAttribute("data-var-index")));
                else if (action === "run-experiment") await runExperiment();
                else if (action === "refresh-packets") await refreshPackets();
                else if (action === "run-privacy-proof") await runPrivacyProof();
                render();
            } catch (error) {
                log(`${action} failed: ${error.message}`, "bad");
            }
        });

        refreshCore({quiet: true}).then(() => {
            state.initialized = true;
            log("Workflow console initialized.", "ok");
        });
        render();
    })();
</script>
</body>
</html>
