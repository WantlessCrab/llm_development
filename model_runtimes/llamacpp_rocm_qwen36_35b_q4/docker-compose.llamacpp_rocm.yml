# docker-compose.llamacpp_rocm.yml

x-gpu-service-config: &gpu-service-config
  devices:
    - /dev/kfd
    - /dev/dri/renderD129
  group_add:
    - video
    - render
  cap_add:
    - SYS_PTRACE
  security_opt:
    - seccomp:unconfined
  ipc: host
  shm_size: 16g
  environment:
    - ROCR_VISIBLE_DEVICES=0
    - HIP_VISIBLE_DEVICES=0
    - PYTHONUNBUFFERED=1

services:
  llamacpp-rocm-qwen36-35b-q4:
    build:
      context: .
      dockerfile: dockerfile.llamacpp_rocm
      args:
        BASE_IMAGE: ${BASE_IMAGE:-rocm/dev-ubuntu-24.04:7.1.1-complete}
        LLAMACPP_REPO: ${LLAMACPP_REPO:-https://github.com/ggml-org/llama.cpp.git}
        LLAMACPP_REF: ${LLAMACPP_REF:-cfff1fc3003239cfe00aca031345107687d30d7b}
        AMDGPU_TARGETS: ${AMDGPU_TARGETS:-gfx1100}
        CMAKE_BUILD_TYPE: ${CMAKE_BUILD_TYPE:-Release}
        LLAMA_CURL: ${LLAMA_CURL:-ON}

    image: localproject/llamacpp-rocm-qwen36-35b-q4:latest
    container_name: llamacpp-rocm-qwen36-35b-q4
    <<: *gpu-service-config

    ports:
      - "127.0.0.1:${HOST_PORT:-8023}:8000"

    volumes:
      - ./models:/workspace/models
      - ./cache:/workspace/cache
      - ./logs:/workspace/logs

    environment:
      - ROCR_VISIBLE_DEVICES=0
      - HIP_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1

      - RUNTIME_ID=${RUNTIME_ID:-qwen36_35b_q4_llamacpp}

      - LLAMA_ARG_MODEL=${LLAMA_ARG_MODEL:-/workspace/models/Qwen3.6-35B-A3B-UD-Q4_K_S.gguf}
      - LLAMA_ARG_ALIAS=${LLAMA_ARG_ALIAS:-local-qwen36-35b-q4-llamacpp}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8000

      - LLAMA_ARG_DEVICE=${LLAMA_ARG_DEVICE:-ROCm0}

      - LLAMA_ARG_CTX_SIZE=${LLAMA_ARG_CTX_SIZE:-4096}
      - LLAMA_ARG_N_GPU_LAYERS=${LLAMA_ARG_N_GPU_LAYERS:-auto}

      - LLAMA_ARG_CPU_MOE=${LLAMA_ARG_CPU_MOE:-false}
      - LLAMA_ARG_N_CPU_MOE=${LLAMA_ARG_N_CPU_MOE:-0}

      - LLAMA_ARG_CACHE_TYPE_K=${LLAMA_ARG_CACHE_TYPE_K:-q4_0}
      - LLAMA_ARG_CACHE_TYPE_V=${LLAMA_ARG_CACHE_TYPE_V:-q4_0}
      - LLAMA_ARG_FLASH_ATTN=${LLAMA_ARG_FLASH_ATTN:-auto}
      - LLAMA_ARG_REASONING=${LLAMA_ARG_REASONING:-off}

      - LLAMA_ARG_BATCH_SIZE=${LLAMA_ARG_BATCH_SIZE:-512}
      - LLAMA_ARG_UBATCH_SIZE=${LLAMA_ARG_UBATCH_SIZE:-256}
      - LLAMA_ARG_THREADS=${LLAMA_ARG_THREADS:-8}
      - LLAMA_ARG_THREADS_BATCH=${LLAMA_ARG_THREADS_BATCH:-16}
      - LLAMA_ARG_N_PARALLEL=${LLAMA_ARG_N_PARALLEL:-1}

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    stdin_open: true
    tty: true

    # No restart yet. Add restart: unless-stopped only after first-boot.