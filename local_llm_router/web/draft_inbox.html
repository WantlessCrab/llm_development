            <div class="timeline">${state.liveEvents.map(renderEventItem).join("") || `<div class="empty">No live events captured in this page session.</div>`}</div>
        `;
        }

        function renderEventItem(event) {
            const error = String(event.event_type || "").includes("failed") || event.ok === false;
            const warn = String(event.event_type || "").includes("cancel") || String(event.event_type || "").includes("clear");
            return `<div class="timeline-item"><span class="dot ${error ? "error" : warn ? "warn" : ""}"></span><div><div class="record-title">${escapeHtml(event.event_type || "event")}</div><div class="record-sub">${escapeHtml(fmtDate(event.created_at || event.received_at))} · ${escapeHtml(shortId(event.event_id || ""))}</div><pre class="raw-box">${escapeHtml(safeJson(event))}</pre></div></div>`;
        }

        function renderDiagnostics() {
            const selected = selectedDraft();
            els.diagnosticsBody.innerHTML = `
            <div class="two-col">
                <button class="button slim" data-action="copy-all-json">Copy loaded state JSON</button>
                <button class="button slim" data-action="copy-selected-json" ${selected ? "" : "disabled"}>Copy selected JSON</button>
            </div>
            <div class="meta-grid">
                <div class="meta-key">last loaded</div><div class="meta-val">${escapeHtml(fmtDate(state.lastLoadedAt))}</div>
                <div class="meta-key">database</div><div class="meta-val">${escapeHtml(state.statusDetail?.database_path || "")}</div>
                <div class="meta-key">format capture</div><div class="meta-val">${escapeHtml(state.statusDetail?.format_capture_version || "")}</div>
                <div class="meta-key">visible errors</div><div class="meta-val">${state.errors.length}</div>
            </div>
            <h3>Routes</h3>
            <pre class="raw-box">${escapeHtml(safeJson(state.statusDetail?.routes || []))}</pre>
            <h3>Recent API errors</h3>
            <pre class="raw-box">${escapeHtml(safeJson(state.errors))}</pre>
        `;
        }

        function renderInspector() {
            const draft = selectedDraft();
            if (!draft) {
                els.inspectorPill.textContent = "None";
                els.inspectorPill.className = "pill off";
                els.inspectorSummary.textContent = "No record selected";
                els.inspectorBody.innerHTML = `<div class="empty">Select an engagement to inspect its chain, content, metadata, diagnostics, and actions.</div>`;
                return;
            }
            els.inspectorPill.textContent = statusLabel(draft.status);
            els.inspectorPill.className = `pill ${statusClass(draft.status)}`;
            els.inspectorSummary.textContent = `${shortId(draft.delivery_id, 12, 7)} · ${providerLabel(draft.provider)}`;
            const chain = chainItemsForDraft(draft);
            els.inspectorBody.innerHTML = `
            <div class="timeline">${chain.map(item => `<div class="timeline-item"><span class="dot ${item.tone || ""}"></span><div><div class="record-title">${escapeHtml(item.title)}</div><div class="record-sub">${escapeHtml(item.detail)}</div></div></div>`).join("")}</div>
            <div class="meta-grid">
                <div class="meta-key">delivery_id</div><div class="meta-val">${escapeHtml(draft.delivery_id)}</div>
                <div class="meta-key">message_id</div><div class="meta-val">${escapeHtml(draft.message_id)}</div>
                <div class="meta-key">route_id</div><div class="meta-val">${escapeHtml(draft.route_id)}</div>
                <div class="meta-key">queue_group</div><div class="meta-val">${escapeHtml(queueGroupName(draft.queue_group_id || "default"))} · ${escapeHtml(draft.queue_group_id || "default")}</div>
                <div class="meta-key">source_session</div><div class="meta-val">${escapeHtml(sessionLabel(sessionKey(draft)))} · ${escapeHtml(sessionKey(draft))}</div>
                <div class="meta-key">provider</div><div class="meta-val">${escapeHtml(providerLabel(draft.provider))} · ${escapeHtml(draft.provider)}</div>
                <div class="meta-key">role</div><div class="meta-val">${escapeHtml(draft.role || "")}</div>
                <div class="meta-key">body</div><div class="meta-val">${Number(draft.body_length || 0)} chars · ${escapeHtml(draft.body_hash || "")}</div>
                <div class="meta-key">captured</div><div class="meta-val">${escapeHtml(fmtDate(draft.captured_at))}</div>
                <div class="meta-key">queued</div><div class="meta-val">${escapeHtml(fmtDate(draft.queued_at))}</div>
            </div>
            <div class="split-actions">
                <button class="button slim" data-action="copy-wrapped" data-delivery-id="${escapeHtml(draft.delivery_id)}">Copy routed text</button>
                <button class="button slim" data-action="copy-source" data-delivery-id="${escapeHtml(draft.delivery_id)}">Copy source text</button>
                <button class="button slim ok" data-action="dispatch" data-delivery-id="${escapeHtml(draft.delivery_id)}">Dispatch</button>
                <button class="button slim" data-action="handled" data-delivery-id="${escapeHtml(draft.delivery_id)}">Mark handled</button>
                <button class="button slim danger" data-action="cancel" data-delivery-id="${escapeHtml(draft.delivery_id)}">Cancel</button>
            </div>
            <h3>Routed body</h3><pre class="raw-box">${escapeHtml(primaryText(draft))}</pre>
            <h3>Source body</h3><pre class="raw-box">${escapeHtml(sourceText(draft))}</pre>
            <h3>Format diagnostics</h3><pre class="raw-box">${escapeHtml(safeJson(draft.format_diagnostics || {}))}</pre>
            <h3>Metadata</h3><pre class="raw-box">${escapeHtml(safeJson(draft.metadata || {}))}</pre>
        `;
        }

        function chainItemsForDraft(draft) {
            const items = [
                {
                    title: "Source session",
                    detail: `${sessionLabel(sessionKey(draft))} · ${shortId(sessionKey(draft), 14, 7)}`
                },
                {
                    title: "Message captured",
                    detail: `${draft.provider}/${draft.role} · ${fmtDate(draft.captured_at)} · ${shortId(draft.message_id, 13, 7)}`
                },
                {
                    title: "Local draft delivery",
                    detail: `${draft.route_id} · ${fmtDate(draft.queued_at)} · ${shortId(draft.delivery_id, 13, 7)}`
                },
            ];
            if (draft.status === "dispatching" || draft.status === "dispatched") items.push({
                title: "Provider dispatch",
                detail: `${statusLabel(draft.status)} · ${providerLabel(draft.provider)}`,
                tone: "warn"
            });
            if (draft.status === "response_received" || isProviderResponseDraft(draft)) items.push({
                title: "Provider response lane",
                detail: `${providerLabel(draft.provider)} response is available as local draft`,
                tone: ""
            });
            if (draft.status === "draft_inserted") items.push({
                title: "Inserted into browser composer",
                detail: `${fmtDate(draft.acknowledged_at)} · manual send boundary preserved`
            });
            if (draft.status === "handled") items.push({
                title: "Handled",
                detail: `${fmtDate(draft.acknowledged_at)} · completed`,
                tone: ""
            });
            if (draft.status === "cancelled") items.push({
                title: "Cancelled",
                detail: `${fmtDate(draft.cancelled_at)} · preserved for history`,
                tone: "warn"
            });
            if (draft.status === "failed") items.push({
                title: "Failed",
                detail: draft.error || "failure recorded",
                tone: "error"
            });
            return items;
        }

        async function copyText(text, label = "text") {
            await navigator.clipboard.writeText(String(text || ""));
            setStatus(`Copied ${label}.`);
        }

        function draftById(deliveryId) {
            return state.drafts.find(d => d.delivery_id === deliveryId) || null;
        }

        async function cancelDraft(deliveryId) {
            const draft = draftById(deliveryId);
            if (!draft) return;
            if (!confirm(`Cancel delivery ${shortId(deliveryId)}? Captured source history remains stored.`)) return;
            await api(`/api/v1/drafts/${encodeURIComponent(deliveryId)}/cancel`, {
                method: "POST",
                body: JSON.stringify({reason: "cancelled from control center"})
            });
            await loadAll({silent: true});
            setStatus(`Cancelled ${shortId(deliveryId)}.`);
        }

        async function markHandled(deliveryId) {
            await api(`/api/v1/drafts/${encodeURIComponent(deliveryId)}/handled`, {method: "POST"});
            await loadAll({silent: true});
            setStatus(`Marked handled: ${shortId(deliveryId)}.`);
        }

        async function dispatchDraft(deliveryId) {
            const draft = draftById(deliveryId);
            const provider = selectedDispatchProvider();
            if (!draft || !provider) {
                setStatus("Select a delivery and dispatch-capable provider first.", "warn");
                return;
            }
            if (!confirm(`Dispatch ${shortId(deliveryId)} to ${providerLabel(provider)}?`)) return;
            const wrapper = selectedWrapper();
            const response = await api(`/api/v1/providers/${encodeURIComponent(provider.provider_id)}/dispatch`, {
                method: "POST",
                body: JSON.stringify({
                    delivery_id: deliveryId,
                    queue_group_id: draft.queue_group_id || null,
                    manual_confirmed: true,
                    prompt_wrapper_id: wrapper?.wrapper_id || null,
                    prompt_wrapper_label: wrapper?.label || null,
                    options: {
                        source: "draft_inbox_control_center",
                        control_center: true,
                        prompt_wrapper_id: wrapper?.wrapper_id || null,
                        prompt_wrapper_label: wrapper?.label || null,
                        operator_action_id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now())
                    }
                }),
            });
            await loadAll({silent: true});
            const generated = (response.generated_delivery_ids || []).map(id => shortId(id)).join(", ") || "none";
            setStatus(`Dispatch ${response.ok ? "completed" : "blocked"}: ${response.message || response.status}. Generated: ${generated}.`, response.ok ? "info" : "warn");
        }

        async function probeProvider(providerId) {
            const response = await api(`/api/v1/providers/${encodeURIComponent(providerId)}/probe`, {method: "POST"});
            await loadAll({silent: true});
            setStatus(`Provider probe ${response.ok ? "ok" : "failed"}: ${providerId} · ${response.message}`, response.ok ? "info" : "warn");
        }

        async function runServiceAction(action, serviceId) {
            const dangerous = action === "stop" || action === "restart";
            if (dangerous && !confirm(`${action} ${serviceId}? Lifecycle authority is Supervisor/code-svc.`)) return;
            const response = await api(`/api/v1/local-services/${encodeURIComponent(action)}`, {
                method: "POST",
                body: JSON.stringify({target: serviceId}),
            });
            state.services = response.services || state.services;
            renderServices();
            setStatus(`${action} ${serviceId}: ${response.message}`, response.ok ? "info" : "warn");
        }

        async function clearQueued({all = false, groupId = null} = {}) {
            const effectiveGroup = all ? null : (groupId || (state.filters.queueGroup === "all" ? null : state.filters.queueGroup));
            const provider = state.filters.provider === "all" ? null : state.filters.provider;
            const label = all ? "all queued deliveries" : effectiveGroup ? `queued deliveries in ${queueGroupName(effectiveGroup)}` : "visible queued deliveries";
            if (!confirm(`Clear ${label}? This cancels queued delivery records and preserves captured message history.`)) return;
            const response = await api("/api/v1/drafts/clear-queued", {
                method: "POST",
                body: JSON.stringify({
                    queue_group_id: effectiveGroup,
                    provider,
                    reason: all ? "cleared all queued deliveries from control center" : "cleared queued deliveries from control center",
                }),
            });
            await loadAll({silent: true});
            setStatus(`Cancelled ${response.cancelled_count || 0} queued delivery record(s).`);
        }

        async function createGroup() {
            const name = els.newGroupName.value.trim();
            if (!name) return setStatus("Enter a queue group name first.", "warn");
            const response = await api("/api/v1/queue-groups", {method: "POST", body: JSON.stringify({name})});
            els.newGroupName.value = "";
            if (response.queue_group_id) state.filters.queueGroup = response.queue_group_id;
            saveFilters();
            await loadAll({silent: true});
            setStatus(`Created queue group: ${response.queue_group?.name || name}`);
        }

        async function renameSelectedGroup() {
            const groupId = state.filters.queueGroup;
            const name = els.renameGroupName.value.trim();
            if (!groupId || groupId === "all") return setStatus("Select a specific queue group before renaming.", "warn");
            if (groupId === "default") return setStatus("Default queue cannot be renamed.", "warn");
            if (!name) return setStatus("Enter a new group name first.", "warn");
            const response = await api(`/api/v1/queue-groups/${encodeURIComponent(groupId)}/rename`, {
                method: "POST",
                body: JSON.stringify({name})
            });
            els.renameGroupName.value = "";
            await loadAll({silent: true});
            setStatus(response.ok ? `Renamed group: ${response.queue_group?.name || name}` : `Rename failed: ${response.error}`, response.ok ? "info" : "warn");
        }

        async function deleteSelectedGroup() {
            const groupId = state.filters.queueGroup;
            if (!groupId || groupId === "all") return setStatus("Select a specific queue group before deleting.", "warn");
            if (groupId === "default") return setStatus("Default queue cannot be deleted.", "warn");
            if (!confirm(`Delete queue group ${queueGroupName(groupId)}? Queued items in the group will be cancelled.`)) return;
            const response = await api(`/api/v1/queue-groups/${encodeURIComponent(groupId)}/delete`, {
                method: "POST",
                body: JSON.stringify({cancel_queued: true, reason: "deleted from control center"})
            });
            state.filters.queueGroup = "all";
            saveFilters();
            await loadAll({silent: true});
            setStatus(response.ok ? `Deleted group. Cancelled: ${response.cancelled_count || 0}.` : `Delete failed: ${response.error}`, response.ok ? "info" : "warn");
        }

        async function saveSession(sessionId, provider) {
            const labelInput = document.querySelector(`[data-session-label-input="${CSS.escape(sessionId)}"]`);
            const groupSelect = document.querySelector(`[data-session-group-select="${CSS.escape(sessionId)}"]`);
            const label = labelInput?.value?.trim() || sessionLabel(sessionId);
            const groupId = groupSelect?.value || "default";
            if (label) {
                await api("/api/v1/sessions/label", {
                    method: "POST",
                    body: JSON.stringify({source_session_id: sessionId, provider, label, label_source: "user_saved"})
                });
            }
            await api("/api/v1/sessions/queue-group", {
                method: "POST",
                body: JSON.stringify({source_session_id: sessionId, provider, label, queue_group_id: groupId})
            });
            await loadAll({silent: true});
            setStatus(`Saved session ${shortId(sessionId)} · ${label} · ${queueGroupName(groupId)}.`);
        }

        async function previewWrapper() {
            const draft = selectedDraft();
            const wrapper = selectedWrapper();
            const target = byId("wrapperPreview");
            if (!draft || !wrapper || !target) return;
            const response = await api("/api/v1/prompt-wrappers/apply", {
                method: "POST",
                body: JSON.stringify({wrapper_id: wrapper.wrapper_id, text: primaryText(draft)})
            });
            target.innerHTML = `<h3>Wrapper preview</h3><pre class="raw-box">${escapeHtml(response.text || "")}</pre>`;
            setStatus(`Previewed wrapper ${wrapper.label || wrapper.wrapper_id}.`);
        }

        async function runDiscovery() {
            if (!confirm("Run provider discovery now? Active config is not overwritten by discovery.")) return;
            const response = await api("/api/v1/provider-discovery/run", {
                method: "POST",
                body: JSON.stringify({probe: true, include_offline_candidates: true, persist_report: true})
            });
            state.discovery = response;
            await loadAll({silent: true});
            setStatus(`Provider discovery completed: ${(response.candidates || []).length} candidate(s), ${(response.applied_provider_ids || []).length} applied.`);
        }

        function connectEvents() {
            if (state.eventSource) return;
            const source = new EventSource("/api/v1/events");
            state.eventSource = source;
            const handler = event => {
                let payload = {event_type: event.type, received_at: new Date().toISOString(), data: event.data};
                try {
                    payload = {
                        ...JSON.parse(event.data || "{}"),
                        event_type: event.type,
                        received_at: new Date().toISOString()
                    };
                } catch (_) {
                }
                state.liveEvents.unshift(payload);
                state.liveEvents = state.liveEvents.slice(0, 80);
                renderEvents();
            };
            for (const type of EVENT_TYPES) source.addEventListener(type, handler);
            source.onerror = () => {
                state.liveEvents.unshift({
                    event_type: "event_stream.error",
                    received_at: new Date().toISOString(),
                    message: "Event stream disconnected or unavailable."
                });
                state.liveEvents = state.liveEvents.slice(0, 80);
                renderEvents();
            };
            renderEvents();
            setStatus("Connected live event stream.");
        }

        function disconnectEvents() {
            if (state.eventSource) state.eventSource.close();
            state.eventSource = null;
            renderEvents();
            setStatus("Disconnected live event stream.");
        }

        function bindEvents() {
            document.addEventListener("click", event => {
                const toggle = event.target.closest("[data-toggle-section]");
                if (toggle) {
                    const name = toggle.dataset.toggleSection;
                    state.sections[name] = !state.sections[name];
                    saveSections();
                    applySectionState();
                    return;
                }
                const actionEl = event.target.closest("[data-action]");
                if (!actionEl) return;
                const action = actionEl.dataset.action;
                const deliveryId = actionEl.dataset.deliveryId;
                const draft = deliveryId ? draftById(deliveryId) : null;
                Promise.resolve().then(async () => {
                    if (action === "select") selectDelivery(deliveryId);
                    else if (action === "select-scroll") scrollToDelivery(deliveryId);
                    else if (action === "copy-wrapped" && draft) await copyText(primaryText(draft), "routed text");
                    else if (action === "copy-source" && draft) await copyText(sourceText(draft), "source text");
                    else if (action === "copy-selected-json" && selectedDraft()) await copyText(safeJson(selectedDraft()), "selected JSON");
                    else if (action === "copy-all-json") await copyText(safeJson({
                        statusDetail: state.statusDetail,
                        adminSummary: state.adminSummary,
                        providers: state.providers,
                        queueGroups: state.queueGroups,
                        providerSessions: state.providerSessions,
                        services: state.services,
                        drafts: state.drafts
                    }), "loaded state JSON");
                    else if (action === "copy-status-json") await copyText(safeJson(state.statusDetail || {}), "status JSON");
                    else if (action === "copy-provider-json") await copyText(safeJson(state.providers.find(p => p.provider_id === actionEl.dataset.providerId) || {}), "provider JSON");
                    else if (action === "copy-discovery-json") await copyText(safeJson(state.discovery || {}), "discovery JSON");
                    else if (action === "copy-wrapper-json") await copyText(safeJson(state.promptWrappers), "prompt wrapper JSON");
                    else if (action === "cancel") await cancelDraft(deliveryId);
                    else if (action === "handled") await markHandled(deliveryId);
                    else if (action === "dispatch") await dispatchDraft(deliveryId);
                    else if (action === "probe-provider") await probeProvider(actionEl.dataset.providerId);
                    else if (action === "select-provider") selectProvider(actionEl.dataset.providerId);
                    else if (action === "metric-filter") applyMetricFilter(actionEl.dataset.filter);
                    else if (action === "filter-session") setFilter("session", actionEl.dataset.sessionId);
                    else if (action === "filter-group") setFilter("queueGroup", actionEl.dataset.groupId);
                    else if (action === "clear-group-queued") await clearQueued({groupId: actionEl.dataset.groupId});
                    else if (action === "save-session") await saveSession(actionEl.dataset.sessionId, actionEl.dataset.provider || "chatgpt");
                    else if (action === "open-url") window.open(actionEl.dataset.url, "_blank", "noopener,noreferrer");
                    else if (action === "service-status") await runServiceAction("status", actionEl.dataset.serviceId);
                    else if (action === "service-start") await runServiceAction("start", actionEl.dataset.serviceId);
                    else if (action === "service-restart") await runServiceAction("restart", actionEl.dataset.serviceId);
                    else if (action === "service-stop") await runServiceAction("stop", actionEl.dataset.serviceId);
                    else if (action === "select-wrapper") selectWrapper(actionEl.dataset.wrapperId);
                    else if (action === "preview-wrapper") await previewWrapper();
                    else if (action === "run-discovery") await runDiscovery();
                    else if (action === "connect-events") connectEvents();
                    else if (action === "disconnect-events") disconnectEvents();
                    else if (action === "clear-events") {
                        state.liveEvents = [];
                        renderEvents();
                    } else if (action === "refresh-services") await refreshServicesOnly();
                }).catch(showError);
            });

            els.refreshAll.onclick = () => loadAll().catch(showError);
            els.expandAll.onclick = () => {
                for (const key of Object.keys(state.sections)) state.sections[key] = true;
                saveSections();
                applySectionState();
            };
            els.collapseAll.onclick = () => {
                for (const key of Object.keys(state.sections)) state.sections[key] = false;
                saveSections();
                applySectionState();
            };
            els.openApiHealth.onclick = () => window.open("/health", "_blank", "noopener,noreferrer");
            els.clearFilters.onclick = () => {
                state.filters = {...defaultFilters};
                saveFilters();
                renderAll();
                setStatus("Filters cleared.");
            };
            els.clearVisibleQueued.onclick = () => clearQueued({all: false}).catch(showError);
            els.clearAllQueued.onclick = () => clearQueued({all: true}).catch(showError);
            els.createGroup.onclick = () => createGroup().catch(showError);
            els.renameGroup.onclick = () => renameSelectedGroup().catch(showError);
            els.deleteGroup.onclick = () => deleteSelectedGroup().catch(showError);

            const filterBindings = [
                [els.searchBox, "search", "input"],
                [els.statusFilter, "status", "change"],
                [els.sourceModeFilter, "sourceMode", "change"],
                [els.queueGroupFilter, "queueGroup", "change"],
                [els.providerFilter, "provider", "change"],
                [els.sessionFilter, "session", "change"],
                [els.sortMode, "sort", "change"],
                [els.displayMode, "display", "change"],
            ];
            for (const [el, key, eventName] of filterBindings) {
                el.addEventListener(eventName, () => {
                    state.filters[key] = el.value;
                    saveFilters();
                    renderAll();
                });
            }

            document.addEventListener("keydown", event => {
                if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "r") {
                    event.preventDefault();
                    loadAll().catch(showError);
                }
            });
        }

        function selectDelivery(deliveryId) {
            state.selectedDeliveryId = deliveryId || "";
            localStorage.setItem(STORAGE_KEYS.selectedDeliveryId, state.selectedDeliveryId);
            renderSelectedTools();
            renderEngagements();
            renderInspector();
            setStatus(`Selected delivery ${shortId(deliveryId)}.`);
        }

        function scrollToDelivery(deliveryId) {
            state.sections.engagements = true;
            saveSections();
            renderEngagements();
            renderInspector();
            applySectionState();
            requestAnimationFrame(() => document.getElementById(`delivery-${deliveryId}`)?.scrollIntoView({
                behavior: "smooth",
                block: "center"
            }));
        }

        function selectProvider(providerId) {
            state.dispatchProviderId = providerId || "";
            if (providerId) localStorage.setItem(STORAGE_KEYS.providerId, providerId);
            renderProviders();
            renderSelectedTools();
            setStatus(`Selected dispatch provider: ${providerLabel(providerId)}.`);
        }

        function selectWrapper(wrapperId) {
            state.selectedWrapperId = wrapperId || "";
            if (wrapperId) localStorage.setItem(STORAGE_KEYS.wrapperId, wrapperId);
            else localStorage.removeItem(STORAGE_KEYS.wrapperId);
            renderWrappers();
            renderSelectedTools();
            setStatus(wrapperId ? `Selected wrapper: ${wrapperById(wrapperId)?.label || wrapperId}.` : "Prompt wrapper disabled.");
        }

        function setFilter(key, value) {
            state.filters[key] = value;
            saveFilters();
            renderAll();
            setStatus(`Filter updated: ${key}.`);
        }

        function applyMetricFilter(filter) {
            if (["queued", "response_received", "handled", "failed"].includes(filter)) state.filters.status = filter;
            if (filter === "session") state.sections.sessions = true;
            if (filter === "group") state.sections.groups = true;
            saveFilters();
            saveSections();
            renderAll();
        }

        async function refreshServicesOnly() {
            const response = await api("/api/v1/local-services/status");
            state.services = response.services || [];
            renderServices();
            renderOverview();
            setStatus("Service status refreshed.");
        }

        function showError(error) {
            console.error(error);
            state.errors.unshift({error: String(error), at: new Date().toISOString()});
            state.errors = state.errors.slice(0, 20);
            setStatus(`Error: ${error}`, "error");
            renderDiagnostics();
        }

        function init() {
            bindEvents();
            applySectionState();
            loadAll().catch(showError);
        }

        init();
    })();
</script>
</body>
</html>
